services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: majun_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d majun_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/majun_admin?schema=public
      LEGACY_DATABASE_URL: ${LEGACY_DATABASE_URL:-}
      SESSION_SECRET: complex_password_at_least_32_characters_long_for_majun_admin
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
